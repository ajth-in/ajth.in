name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - run: ssh-keyscan ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: copy _site to server
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "sudo rm -rf ${{ env.DEPLOY_PATH }}/*"
          tar -C _site -cf - . | ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "sudo tar -C ${{ env.DEPLOY_PATH }} -xf -"

      - name: reload nginx
        run: ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "sudo nginx -s reload"
